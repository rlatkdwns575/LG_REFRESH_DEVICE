name: mojito
description: "A new Flutter deep learning project."
publish_to: 'none'

# 1. SDK 버전을 3.10.0 이상으로 올려 main.dart의 문법 에러를 해결합니다.
environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  tflite_flutter: ^0.10.4
  image: ^4.1.3

# 2. 기본 테스트 파일과 린트 설정 파일이 요구하는 의존성을 채워줍니다.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/model.tflite
    - assets/labels.txt